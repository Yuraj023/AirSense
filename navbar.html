<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirSense Navbar MVP</title>

  <style>
    /* ==== GLOBAL STYLES ==== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1600&q=80')
        no-repeat center center/cover;
      color: white;
      height: 100vh;
      overflow-x: hidden;
    }

    /* ==== NAVBAR ==== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
    }

    .logo span {
      color: #4fd1c5;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s, transform 0.3s;
    }

    .nav-links a:hover {
      color: white;
      transform: scale(1.1);
    }

    /* ==== HAMBURGER ==== */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
      z-index: 1100;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: white;
      margin: 4px 0;
      transition: all 0.3s;
    }

    /* ==== MOBILE MENU OVERLAY ==== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      transform: translateY(-100%);
      opacity: 0;
      transition: all 0.5s ease;
      z-index: 100;
    }

    .overlay.active {
      transform: translateY(0);
      opacity: 1;
    }

    .overlay a {
      font-size: 2rem;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .overlay a:hover {
      color: #4fd1c5;
    }

    /* ==== RESPONSIVE ==== */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ==== ANIMATED HAMBURGER ==== */
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(5px, -5px);
    }
  </style>
</head>
<body>
  <!-- ==== NAVBAR ==== -->
  <header class="navbar">
    <div class="logo">AirSense<span>.</span></div>

    <nav class="nav-links">
      <a href="#">Dashboard</a>
      <a href="#">Analytics</a>
      <a href="#">Reports</a>
      <a href="#">Alerts</a>
      <a href="#">Settings</a>
    </nav>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- ==== MOBILE OVERLAY ==== -->
  <div class="overlay" id="overlay">
    <a href="#">Dashboard</a>
    <a href="#">Analytics</a>
    <a href="#">Reports</a>
    <a href="#">Alerts</a>
    <a href="#">Settings</a>
  </div>

  <script>
    const hamburger = document.getElementById("hamburger");
    const overlay = document.getElementById("overlay");

    hamburger.addEventListener("click", () => {
      hamburger.classList.toggle("active");
      overlay.classList.toggle("active");
    });

    document.querySelectorAll(".overlay a").forEach((link) => {
      link.addEventListener("click", () => {
        overlay.classList.remove("active");
        hamburger.classList.remove("active");
      });
    });
  </script>
</body>
</html>
